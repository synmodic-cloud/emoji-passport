<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1F3864">
  <title>Met List – Emoji Passport 🛂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind = { config: { theme: { extend: {
      colors: { navy:'#1F3864', teal:'#4472C4' },
      fontFamily: { sans: ['Inter','sans-serif'] }
    }}}}
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; overscroll-behavior: none; }

    @keyframes slideIn {
      from { opacity:0; transform:translateX(-12px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .stamp-card { animation: slideIn 0.3s ease forwards; }
  </style>
</head>
<body class="bg-[#F5F7FA] min-h-screen">

<!-- ── Header ── -->
<div class="sticky top-0 z-10 bg-[#1F3864] text-white px-4 py-4">
  <div class="flex items-center justify-between max-w-md mx-auto">
    <a href="passport.html" class="text-blue-200 text-sm font-medium">← Back</a>
    <div>
      <div class="font-bold text-center">👥 People You've Met</div>
      <div id="headerCount" class="text-blue-200 text-xs text-center"></div>
    </div>
    <div class="w-12"></div>
  </div>
</div>

<!-- ── Content ── -->
<div class="max-w-md mx-auto px-4 pt-4 pb-28">

  <!-- Loading -->
  <div id="loadingState" class="flex flex-col items-center justify-center py-20 text-gray-400">
    <div class="text-4xl mb-3 animate-spin">🛂</div>
    <p class="text-sm">Loading your met list…</p>
  </div>

  <!-- Empty state -->
  <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center px-6">
    <div class="text-7xl mb-4">👋</div>
    <h2 class="text-xl font-bold text-gray-700 mb-2">No stamps yet</h2>
    <p class="text-gray-400 text-sm mb-6">
      Go scan someone's QR code to start collecting stamps and building your network!
    </p>
    <a href="scan.html"
       class="bg-[#1F3864] text-white px-8 py-3 rounded-xl font-semibold
              hover:opacity-90 active:scale-95 transition-all">
      Start Scanning → 📷
    </a>
  </div>

  <!-- Stamp list -->
  <div id="stampList" class="hidden space-y-2"></div>

</div>

<!-- ── Bottom Nav ── -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-10">
  <div class="flex items-center justify-around h-16 max-w-lg mx-auto px-2">
    <a href="passport.html" class="flex flex-col items-center flex-1 h-full justify-center gap-0.5 text-gray-400">
      <span class="text-2xl">🛂</span><span class="text-[10px] font-medium">Passport</span>
    </a>
    <a href="scan.html" class="flex flex-col items-center flex-1 h-full justify-center gap-0.5 text-gray-400">
      <span class="text-2xl">📷</span><span class="text-[10px] font-medium">Scan</span>
    </a>
    <a href="met.html" class="flex flex-col items-center flex-1 h-full justify-center gap-0.5 text-[#1F3864]">
      <span class="text-2xl">👥</span><span class="text-[10px] font-semibold">Met</span>
    </a>
  </div>
</nav>


<!-- ════════════════════════════
     SCRIPT
════════════════════════════ -->
<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, onSnapshot, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app = getApps().length ? getApps()[0] : initializeApp({
  apiKey:            "AIzaSyDKCD-Oy3q4_FUJqp4CKZowBx8pvrk-2Tg",
  authDomain:        "emoji-passport.firebaseapp.com",
  projectId:         "emoji-passport",
  storageBucket:     "emoji-passport.firebasestorage.app",
  messagingSenderId: "999626118578",
  appId:             "1:999626118578:web:7f2eca1da183fff778c0ab",
});
const db = getFirestore(app);

const myUserId = localStorage.getItem('emojiPassportUserId');
if (!myUserId) window.location.replace('setup.html');

// ── Time-ago formatter ────────────────────────────────────────────────────────

function timeAgo(timestamp) {
  if (!timestamp) return '';
  const date  = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  const secs  = Math.floor((Date.now() - date.getTime()) / 1000);
  if (secs < 60)          return 'just now';
  if (secs < 3600)        return `${Math.floor(secs / 60)} min ago`;
  if (secs < 86400)       return `${Math.floor(secs / 3600)} hr ago`;
  return date.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

// ── Build a stamp card element ────────────────────────────────────────────────

function makeCard(data, idx) {
  const div = document.createElement('div');
  div.className = 'stamp-card bg-white rounded-2xl shadow-sm px-4 py-3 flex items-center gap-3';
  div.style.animationDelay = `${Math.min(idx * 0.05, 0.4)}s`;
  div.style.opacity = '0'; // starts hidden, animation fills it

  div.innerHTML = `
    <!-- Emojis -->
    <div class="flex gap-1 text-2xl shrink-0 leading-none">
      <span title="Hobby">${data.hobby_emoji || ''}</span>
      <span title="Strength">${data.strength_emoji || ''}</span>
      <span title="Expectation">${data.expect_emoji || ''}</span>
    </div>

    <!-- Divider -->
    <div class="w-px h-8 bg-gray-100 shrink-0"></div>

    <!-- Name + time -->
    <div class="flex-1 min-w-0">
      <div class="font-semibold text-[#1A1A2E] truncate">${escHtml(data.alias || '?')}</div>
      <div class="text-xs text-gray-400 mt-0.5">${timeAgo(data.stamped_at)}</div>
    </div>

    <!-- Stamp number badge -->
    <div class="shrink-0 w-7 h-7 rounded-full bg-[#F5F7FA] flex items-center justify-center">
      <span class="text-[10px] font-bold text-gray-400">#${idx + 1}</span>
    </div>
  `;
  return div;
}

function escHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Real-time listener ────────────────────────────────────────────────────────

const stampsRef = query(
  collection(db, 'stamps', myUserId, 'collected'),
  orderBy('stamped_at', 'desc')
);

onSnapshot(stampsRef, (snap) => {
  const loading  = document.getElementById('loadingState');
  const empty    = document.getElementById('emptyState');
  const list     = document.getElementById('stampList');
  const hdrCount = document.getElementById('headerCount');

  loading.classList.add('hidden');

  const stamps = snap.docs.map(d => d.data());
  const count  = stamps.length;

  hdrCount.textContent = count === 0
    ? 'No one yet — go scan!'
    : `${count} ${count === 1 ? 'person' : 'people'}`;

  if (count === 0) {
    empty.classList.remove('hidden');
    list.classList.add('hidden');
    return;
  }

  empty.classList.add('hidden');
  list.classList.remove('hidden');

  // Rebuild list (simple approach — fine for ≤40 stamps)
  list.innerHTML = '';
  stamps.forEach((data, i) => list.appendChild(makeCard(data, i)));
}, (err) => {
  document.getElementById('loadingState').innerHTML =
    `<div class="text-4xl mb-3">😕</div>
     <p class="text-sm text-red-500">Failed to load: ${err.message}</p>`;
});
</script>
</body>
</html>
