<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D1B2A">
  <title>Live Wall – Emoji Passport 🛂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0D1B2A;
      --navy:        #1F3864;
      --teal:        #4472C4;
      --amber:       #FFC000;
      --card-bg:     rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Root layout ── */
    #app {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }

    /* ════════════════════════════════
       LEFT PANEL — QR + event info
    ════════════════════════════════ */
    #qrPanel {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 32px 24px;
      background: linear-gradient(175deg, #1a3360 0%, #0f2040 100%);
      border-right: 1px solid rgba(255,255,255,0.08);
      position: relative;
      z-index: 2;
    }

    /* Event branding */
    #qrPanel .brand-icon  { font-size: 48px; margin-bottom: 8px; }
    #qrPanel .brand-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.3px; text-align: center; }
    #qrPanel .brand-sub   { font-size: 11px; color: rgba(255,255,255,.4); text-align: center; margin-top: 4px; letter-spacing: .05em; text-transform: uppercase; }

    /* Divider */
    .panel-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 20px 0;
    }

    /* QR code box */
    #wallQrContainer {
      width: 220px;
      height: 220px;
      background: #fff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      flex-shrink: 0;
    }
    #wallQrContainer img {
      width: 220px !important;
      height: 220px !important;
      display: block;
      image-rendering: pixelated;
    }
    #wallQrPlaceholder {
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      padding: 16px;
      line-height: 1.5;
    }

    /* CTA text */
    #qrPanel .cta {
      font-size: 15px;
      font-weight: 800;
      color: var(--amber);
      text-align: center;
      margin-top: 16px;
      letter-spacing: -.2px;
    }
    #qrPanel .cta-sub {
      font-size: 11px;
      color: rgba(255,255,255,.35);
      text-align: center;
      margin-top: 5px;
      word-break: break-all;
      line-height: 1.4;
    }

    /* Joined counter */
    #qrPanel .join-count {
      margin-top: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 6px 20px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,.6);
      text-align: center;
    }
    #qrPanel .join-count span { color: var(--amber); }

    /* ════════════════════════════════
       RIGHT PANEL — card wall
    ════════════════════════════════ */
    #rightPanel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Slim header bar */
    #wallHeader {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 22px;
      background: rgba(31,56,100,0.5);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    #wallHeader .wh-title {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,.5);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    #wallHeader .wh-right {
      font-size: 13px;
      color: rgba(255,255,255,.4);
      font-weight: 600;
    }
    #wallHeader .wh-count { color: var(--amber); font-weight: 800; }

    /* Card grid */
    #wallGrid {
      flex: 1;
      overflow: hidden;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      grid-auto-rows: min-content;
      gap: 12px;
      padding: 16px 18px;
      align-content: start;
    }

    /* Mini passport card */
    .mini-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      opacity: 0;
    }
    .mini-card .alias {
      font-size: 13px; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.2;
    }
    .mini-card .emojis { font-size: 20px; line-height: 1; display: flex; gap: 5px; }
    .mini-card .short-code {
      font-size: 9px; color: rgba(255,255,255,0.22);
      font-family: monospace; letter-spacing: .08em; text-transform: uppercase;
    }

    /* Card entrance */
    @keyframes cardIn {
      0%   { opacity:0; transform:scale(.82) translateY(12px); }
      70%  { opacity:1; transform:scale(1.03) translateY(-2px); }
      100% { opacity:1; transform:scale(1)    translateY(0); }
    }
    .card-enter { animation: cardIn 0.55s cubic-bezier(.175,.885,.32,1.275) forwards; }

    /* ════════════════════════════════
       STANDBY overlay (full screen)
    ════════════════════════════════ */
    #standby {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 20;
      gap: 20px;
    }
    #standby .icon { font-size: 72px; }
    #standby h1    { font-size: 28px; font-weight: 800; color: rgba(255,255,255,.7); }
    #standby p     { font-size: 15px; color: rgba(255,255,255,.35); }

    .dots { display: flex; gap: 8px; margin-top: 8px; }
    .dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--teal);
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dotPulse {
      0%,80%,100% { transform:scale(.6); opacity:.3; }
      40%          { transform:scale(1);  opacity:1;  }
    }

    /* Wall content fade-in */
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .fadein { animation: fadeIn .5s ease; }

    /* Ticker toast — right side to avoid covering QR */
    #ticker {
      position: fixed;
      bottom: 24px;
      right: 32px;
      background: var(--amber);
      color: #1A1A2E;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 999px;
      opacity: 0;
      transition: opacity .3s;
      z-index: 30;
      white-space: nowrap;
      pointer-events: none;
    }
    #ticker.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ── Standby overlay ── -->
<div id="standby">
  <div class="icon">⏳</div>
  <h1>Live Wall</h1>
  <p>Waiting for facilitator to activate…</p>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<!-- ── Main split layout ── -->
<div id="app" style="display:none">

  <!-- LEFT: QR panel -->
  <div id="qrPanel">
    <div class="brand-icon">🛂</div>
    <div class="brand-title">Emoji Passport</div>
    <div id="wallEventName" class="brand-sub">xBU BB2 Talent Accelerator 2026</div>

    <div class="panel-divider"></div>

    <!-- QR code -->
    <div id="wallQrContainer">
      <div id="wallQrPlaceholder">Set join link<br>in Admin panel</div>
    </div>

    <div class="cta">📱 Scan to get your passport!</div>
    <div id="wallJoinUrl" class="cta-sub"></div>

    <div class="panel-divider"></div>

    <div class="join-count">
      <span id="countEl">0</span> / <span id="targetEl">40</span> passports created
    </div>
  </div>

  <!-- RIGHT: card grid -->
  <div id="rightPanel" class="fadein">
    <div id="wallHeader">
      <div class="wh-title">🛂 &nbsp;Live Wall</div>
      <div class="wh-right">Real-time passport wall</div>
    </div>
    <div id="wallGrid"></div>
  </div>

</div>

<!-- Ticker toast -->
<div id="ticker"></div>


<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, doc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app = getApps().length ? getApps()[0] : initializeApp({
  apiKey:            "AIzaSyDKCD-Oy3q4_FUJqp4CKZowBx8pvrk-2Tg",
  authDomain:        "emoji-passport.firebaseapp.com",
  projectId:         "emoji-passport",
  storageBucket:     "emoji-passport.firebasestorage.app",
  messagingSenderId: "999626118578",
  appId:             "1:999626118578:web:7f2eca1da183fff778c0ab",
});
const db = getFirestore(app);

// ── Elements ──────────────────────────────────────────────────────────────────

const standby  = document.getElementById('standby');
const appEl    = document.getElementById('app');
const wallGrid = document.getElementById('wallGrid');
const countEl  = document.getElementById('countEl');
const ticker   = document.getElementById('ticker');

// ── State ─────────────────────────────────────────────────────────────────────

const renderedCards = new Map();
let   tickerTimer   = null;
let   wallActive    = false;
let   isFirstLoad   = true;
let   lastJoinUrl   = '';

// ── QR code renderer ──────────────────────────────────────────────────────────

function renderWallQr(url) {
  if (url === lastJoinUrl) return; // no change
  lastJoinUrl = url;

  const container   = document.getElementById('wallQrContainer');
  const placeholder = document.getElementById('wallQrPlaceholder');
  const urlLabel    = document.getElementById('wallJoinUrl');

  if (!url) {
    container.innerHTML = '<div id="wallQrPlaceholder" style="font-size:12px;color:#94a3b8;text-align:center;padding:16px;line-height:1.5">Set join link<br>in Admin panel</div>';
    urlLabel.textContent = '';
    return;
  }

  try {
    const qr = qrcode(0, 'H');
    qr.addData(url);
    qr.make();
    container.innerHTML = qr.createImgTag(5, 2, 'Join QR');
    const img = container.querySelector('img');
    if (img) img.style.cssText = 'width:220px;height:220px;display:block;image-rendering:pixelated;image-rendering:crisp-edges';
    // Show short URL label
    try {
      const u = new URL(url);
      urlLabel.textContent = u.hostname + u.pathname;
    } catch { urlLabel.textContent = url.slice(0, 40); }
  } catch (e) {
    container.innerHTML = '<div style="font-size:11px;color:#f87171;padding:12px;text-align:center">QR generation failed</div>';
    console.warn('QR error:', e);
  }
}

// ── Mini card ─────────────────────────────────────────────────────────────────

function makeCard(userId, data) {
  const card = document.createElement('div');
  card.className = 'mini-card';
  card.dataset.userId = userId;
  card.innerHTML = `
    <div class="alias">${escHtml(data.alias || '?')}</div>
    <div class="emojis">
      <span>${data.hobby_emoji    || ''}</span>
      <span>${data.strength_emoji || ''}</span>
      <span>${data.expect_emoji   || ''}</span>
    </div>
    <div class="short-code">${userId.slice(0,4).toUpperCase()}</div>
  `;
  return card;
}

function escHtml(str) {
  return String(str).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Ticker toast ──────────────────────────────────────────────────────────────

function showTicker(alias, emojis) {
  ticker.textContent = `✨ ${alias} just joined! ${emojis}`;
  ticker.classList.add('show');
  if (tickerTimer) clearTimeout(tickerTimer);
  tickerTimer = setTimeout(() => ticker.classList.remove('show'), 3500);
}

// ── Admin settings listener ───────────────────────────────────────────────────

onSnapshot(doc(db, 'admin', 'settings'), (snap) => {
  const data = snap.exists() ? snap.data() : {};
  wallActive = data.livewall_active === true;

  // Event name
  if (data.event_name) {
    document.getElementById('wallEventName').textContent = data.event_name;
  }

  // Target count
  document.getElementById('targetEl').textContent = data.target_count ?? 40;

  // Join QR
  renderWallQr(data.join_url || '');

  if (wallActive) {
    standby.style.display = 'none';
    appEl.style.display   = 'flex';
  } else {
    standby.style.display = 'flex';
    appEl.style.display   = 'none';
  }
}, () => {
  // Settings missing → stay on standby
});

// ── Users listener ────────────────────────────────────────────────────────────

onSnapshot(collection(db, 'users'), (snap) => {
  snap.docChanges().forEach((change) => {
    if (change.type === 'added') {
      const { id } = change.doc;
      const data   = change.doc.data();
      if (renderedCards.has(id)) return;

      const card = makeCard(id, data);
      renderedCards.set(id, card);
      wallGrid.appendChild(card);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => card.classList.add('card-enter'));
      });

      if (!isFirstLoad && wallActive) {
        showTicker(data.alias, `${data.hobby_emoji}${data.strength_emoji}${data.expect_emoji}`);
      }
    }
  });

  if (isFirstLoad) isFirstLoad = false;
  countEl.textContent = renderedCards.size;
});
</script>
</body>
</html>
